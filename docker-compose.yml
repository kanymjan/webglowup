services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMIN_KEY: ${ADMIN_KEY:-changeme}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - backend-data:/app/data

  # Чтобы перейти на PostgreSQL вместо H2, раскомментируйте сервис ниже и
  # смените spring.datasource.* в backend/src/main/resources/application.properties
  # (url=jdbc:postgresql://postgres:5432/webglowup, driver-class-name=org.postgresql.Driver),
  # а также добавьте зависимость org.postgresql:postgresql в pom.xml.
  # postgres:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: webglowup
  #     POSTGRES_USER: webglowup
  #     POSTGRES_PASSWORD: change-me
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data

volumes:
  backend-data:
  # postgres-data:
